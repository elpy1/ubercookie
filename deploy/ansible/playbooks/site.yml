---
- name: Deploy ubercookie
  hosts: ubercookie
  become: true
  gather_facts: true

  pre_tasks:
    - name: Require Cloudflare DNS credentials
      ansible.builtin.assert:
        that:
          - cloudflare_api_token | length > 0
          - letsencrypt_email | length > 0
        fail_msg: >-
          Provide cloudflare_api_token and letsencrypt_email through
          inventory/group_vars/all/vault.yml, --extra-vars, or CF_API_TOKEN /
          LETSENCRYPT_EMAIL environment variables.
      tags: [certbot]

    - name: Fetch Cloudflare IPv4 ranges
      ansible.builtin.uri:
        url: https://www.cloudflare.com/ips-v4
        return_content: true
      delegate_to: localhost
      become: false
      run_once: true
      register: cloudflare_ipv4_response
      tags: [preflight, nginx, firewall]

    - name: Fetch Cloudflare IPv6 ranges
      ansible.builtin.uri:
        url: https://www.cloudflare.com/ips-v6
        return_content: true
      delegate_to: localhost
      become: false
      run_once: true
      register: cloudflare_ipv6_response
      when: ubercookie_cloudflare_ipv6_enabled | bool
      tags: [preflight, nginx, firewall]

    - name: Store Cloudflare IPv4 CIDR ranges
      ansible.builtin.set_fact:
        cloudflare_ipv4_cidrs: "{{ cloudflare_ipv4_response.content.splitlines() | reject('match', '^\\s*$') | list }}"
      tags: [preflight, nginx, firewall]

    - name: Store Cloudflare IPv6 CIDR ranges
      ansible.builtin.set_fact:
        cloudflare_ipv6_cidrs: "{{ cloudflare_ipv6_response.content.splitlines() | reject('match', '^\\s*$') | list }}"
      when: ubercookie_cloudflare_ipv6_enabled | bool
      tags: [preflight, nginx, firewall]

    - name: Disable Cloudflare IPv6 CIDR ranges
      ansible.builtin.set_fact:
        cloudflare_ipv6_cidrs: []
      when: not ubercookie_cloudflare_ipv6_enabled | bool
      tags: [preflight, nginx, firewall]

  roles:
    - role: preflight
      tags: [preflight]
    - role: zram
      tags: [zram]
    - role: common
      tags: [common]
    - role: app
      tags: [app]
    - role: certbot
      tags: [certbot]
    - role: nginx
      tags: [nginx]
    - role: firewall
      tags: [firewall]
