---
- name: Check enabled Node.js module stream
  ansible.builtin.command:
    argv:
      - dnf
      - -q
      - module
      - list
      - nodejs
      - --enabled
  changed_when: false
  failed_when: false
  register: nodejs_enabled_stream

- name: Reset mismatched Node.js module stream
  ansible.builtin.command:
    argv:
      - dnf
      - -y
      - module
      - reset
      - nodejs
  when:
    - nodejs_enabled_stream.stdout | trim | length > 0
    - ("nodejs " ~ ubercookie_nodejs_stream) not in nodejs_enabled_stream.stdout

- name: Enable Node.js module stream
  ansible.builtin.command:
    argv:
      - dnf
      - -y
      - module
      - enable
      - "nodejs:{{ ubercookie_nodejs_stream }}"
  when: ("nodejs " ~ ubercookie_nodejs_stream) not in nodejs_enabled_stream.stdout

- name: Install deployment packages
  ansible.builtin.dnf:
    name:
      - firewalld
      - git
      - nginx
      - nodejs
      - npm
      - openssl
      - policycoreutils-python-utils
      - python3.11
      - python3.11-pip
      - rsync
    state: present

- name: Ensure firewalld is running
  ansible.builtin.systemd:
    name: firewalld
    enabled: true
    state: started

- name: Create service group
  ansible.builtin.group:
    name: "{{ ubercookie_run_group }}"
    system: true

- name: Create service user
  ansible.builtin.user:
    name: "{{ ubercookie_run_user }}"
    group: "{{ ubercookie_run_group }}"
    home: "{{ ubercookie_base_dir }}"
    shell: /sbin/nologin
    system: true
    create_home: false

- name: Create application directories
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    owner: "{{ item.owner }}"
    group: "{{ item.group }}"
    mode: "{{ item.mode }}"
  loop:
    - { path: "{{ ubercookie_base_dir }}", owner: root, group: root, mode: "0755" }
    - { path: "{{ ubercookie_app_dir }}", owner: root, group: root, mode: "0755" }
    - { path: "{{ ubercookie_config_dir }}", owner: root, group: "{{ ubercookie_run_group }}", mode: "0750" }
    - { path: "{{ ubercookie_data_dir }}", owner: "{{ ubercookie_run_user }}", group: "{{ ubercookie_run_group }}", mode: "0750" }
